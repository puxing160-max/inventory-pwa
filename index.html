<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>庫存盤點系統 v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        body { background-color: #111827; color: white; -webkit-tap-highlight-color: transparent; }
        .card-green { border-left: 4px solid #10b981; background-color: rgba(16, 185, 129, 0.1); }
        .card-red { border-left: 4px solid #ef4444; background-color: rgba(239, 68, 68, 0.1); }
        .card-none { border-left: 4px solid #4b5563; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>
    <div id="app" class="pb-24">
        <!-- 盤點分頁 -->
        <div id="page-inventory" class="page active p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-blue-400">📋 庫存盤點</h1>
                <button onclick="syncData()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-full text-sm font-medium transition">
                    ↻ 同步雲端
                </button>
            </div>
            <div id="inventory-list" class="space-y-3">
                <!-- 項目由 JS 動態渲染 -->
            </div>
        </div>

        <!-- 報表分頁 -->
        <div id="page-report" class="page p-4">
            <h1 class="text-xl font-bold mb-6 text-green-400">📊 報表匯出</h1>
            <div class="space-y-4">
                <button onclick="exportPPF()" class="w-full py-5 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-bold shadow-lg flex flex-col items-center">
                    <span class="text-lg">生成當月銷售明細</span>
                    <span class="text-xs opacity-80">(符合 115-4-OTC PPF_2 格式)[cite: 1]</span>
                </button>
                <button onclick="exportInventoryReport()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-md">
                    ⬇ 匯出本次盤點結果 (.xlsx)
                </button>
            </div>
        </div>

        <!-- 底部導覽列 -->
        <div class="fixed bottom-0 left-0 right-0 bg-gray-900 border-t border-gray-800 flex justify-around py-4 shadow-2xl z-50">
            <button onclick="showPage('inventory')" class="flex flex-col items-center gap-1 text-gray-400 focus:text-blue-400">
                <span class="text-xl">📋</span>
                <span class="text-xs">盤點</span>
            </button>
            <button onclick="showPage('report')" class="flex flex-col items-center gap-1 text-gray-400 focus:text-green-400">
                <span class="text-xl">📊</span>
                <span class="text-xs">報表</span>
            </button>
        </div>
    </div>

    <script>
        // 已經更新為你截圖 image_0e28d6.png 中的最新網址
        const state = {
            apiUrl: 'https://script.google.com/macros/s/AKfycbw68ZDjI5kzUyhj_QyfYmrzyRvIdG58bZytZ4ft8MYkjs23CUlbuBfyEH7-SjLL0HXbhA/exec', 
            items: [],
            token: 'default_token'
        };

        // 網頁載入後自動執行同步
        window.onload = function() {
            syncData();
        };

        async function syncData() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '<div class="p-10 text-center text-gray-400 animate-pulse font-medium">正在連線雲端資料庫...</div>';
            
            try {
                const res = await fetch(state.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'inventory', token: state.token })
                });
                const data = await res.json();
                if (data.ok) {
                    state.items = data.items;
                    renderItems();
                } else {
                    list.innerHTML = `<div class="p-10 text-center text-red-400 font-bold">同步失敗：${data.error}</div>`;
                }
            } catch (e) {
                list.innerHTML = `<div class="p-10 text-center text-red-400 font-bold">連線錯誤<br><span class="text-xs font-normal text-gray-500">請確認 GAS 權限已設為「所有人」</span></div>`;
            }
        }

        function renderItems() {
            const list = document.getElementById('inventory-list');
            if (state.items.length === 0) {
                list.innerHTML = '<div class="p-10 text-center text-gray-500">目前沒有盤點資料</div>';
                return;
            }

            list.innerHTML = state.items.map(item => {
                let statusClass = 'card-none';
                if (item.userCount !== undefined) {
                    statusClass = item.userCount === item.stock ? 'card-green' : 'card-red';
                }

                return `
                    <div class="p-4 rounded-xl ${statusClass} bg-gray-800 shadow-sm border border-gray-700">
                        <div class="flex justify-between items-center">
                            <div class="flex-1">
                                <div class="text-[10px] text-gray-500 font-mono">${item.code}</div>
                                <div class="font-bold text-gray-100">${item.name}</div>
                                <div class="text-xs mt-1 inline-block px-2 py-0.5 bg-blue-900 text-blue-200 rounded">雲端庫存: ${item.stock}</div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="markCorrect('${item.itemKey}')" class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center text-xl shadow-lg active:scale-95 transition">✅</button>
                                <button onclick="askCount('${item.itemKey}')" class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center text-xl shadow-lg active:scale-95 transition">❌</button>
                            </div>
                        </div>
                        ${item.userCount !== undefined ? `
                            <div class="mt-3 pt-2 border-t border-gray-700 text-right">
                                <span class="text-xs text-gray-400">實際盤點：</span>
                                <span class="text-lg font-black ${item.userCount === item.stock ? 'text-green-400' : 'text-red-400'}">${item.userCount}</span>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function markCorrect(key) {
            const item = state.items.find(i => i.itemKey === key);
            item.userCount = item.stock;
            renderItems();
        }

        function askCount(key) {
            const val = prompt('請輸入實際盤點數量：');
            if (val !== null && val !== "") {
                const item = state.items.find(i => i.itemKey === key);
                item.userCount = parseInt(val) || 0;
                renderItems();
            }
        }

        async function exportPPF() {
            try {
                const res = await fetch(state.apiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getSalesExport', token: state.token })
                });
                const data = await res.json();
                if (!data.ok) return alert('抓取資料失敗：' + data.error);

                const title = [`${data.year}年 ${data.month} 月 復健科OTC銷售記錄`[cite: 1]];
                const headers = ["日期", "姓名", "類別", "品項", "定價", "數量", "折扣", "售價", "備註"[cite: 1]];
                const footer1 = ["總金額", data.summary.total, "PPF", data.summary.ppf, "", "審核"[cite: 1]];
                const footer2 = ["實收金額", data.summary.realAmount, "備註", "ppf已繳入復健科公費", "", "製表"[cite: 1]];

                const ws = XLSX.utils.aoa_to_sheet([title, headers, ...data.sales, [], footer1, footer2]);
                ws['!merges'] = [{ s: {r:0, c:0}, e: {r:0, c:8} }];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "銷售明細");
                XLSX.writeFile(wb, `115-${data.month}-OTC_銷售報表.xlsx`);
            } catch (e) {
                alert('匯出失敗，請檢查網路連線');
            }
        }

        function exportInventoryReport() {
            alert('盤點差異報表功能開發中。');
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
        }
    </script>
</body>
</html>
